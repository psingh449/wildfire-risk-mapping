<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Wildfire Risk Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Wildfire Risk Mapping</h1>

        <div class="controls">
            <label for="county">County:</label>
            <select id="county" class="county-select" title="Bold options are priority demo counties (browser-prefetched when packaged)."></select>

            <label for="metric">Metric:</label>
            <select id="metric">
                <option value="risk_score">Risk</option>
                <option value="hazard_score">Hazard</option>
                <option value="exposure_score">Exposure</option>
                <option value="vulnerability_score">Vulnerability</option>
                <option value="resilience_score">Resilience</option>
                <option value="eal_norm">EAL (Economic Loss)</option>
            </select>

            <button id="reset">Reset</button>

            <!-- ✅ NEW (Commit 18) -->
            <label style="margin-left:10px;">
                <input type="checkbox" id="debugToggle" checked />
                Debug Mode
            </label>
        </div>

        <p id="countyMessage" class="county-message" aria-live="polite"></p>
        <div id="description" class="description"></div>

        <div class="map-container">
            <svg width="900" height="600"></svg>
        </div>

        <div class="footer">
            <p>Block-group level wildfire risk visualization (prototype)</p>
        </div>
    </div>

    <script src="main.js"></script>

</body>
</html>
