<?xml version="1.0" encoding="UTF-8"?>
<!--
  Poster v2  Figma-friendly: no embedded or linked raster files.
  Portrait 30in ť 40in @ 96dpi ť 2880 ť 3840. Dashed regions are placeholders for your screenshots/figures.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="30in" height="40in" viewBox="0 0 2880 3840">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .ink { fill: #0f172a; }
      .muted { fill: #475569; }
      .border { stroke: #e2e8f0; stroke-width: 3; fill: #ffffff; }
      .dash { stroke: #94a3b8; stroke-width: 5; stroke-dasharray: 16 12; fill: #f8fafc; }
      .h1 { font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 800; font-size: 104px; letter-spacing: -0.02em; }
      .h2 { font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 800; font-size: 48px; letter-spacing: -0.01em; }
      .sub { font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 600; font-size: 40px; fill: #475569; }
      .meta { font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 600; font-size: 32px; fill: #475569; }
      .team { font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 600; font-size: 30px; fill: #0f172a; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 28px; fill: #0f172a; }
      .body { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 34px; fill: #0f172a; line-height: 1.22; }
      .eqbox { fill: #0b1220; }
      .eqtxt { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 34px; fill: #e2e8f0; }
      .pill-h { fill: #fff7ed; stroke: #fdba74; stroke-width: 3; }
      .pill-e { fill: #f0f9ff; stroke: #7dd3fc; stroke-width: 3; }
      .pill-v { fill: #faf5ff; stroke: #c4b5fd; stroke-width: 3; }
      .pill-r { fill: #ecfdf5; stroke: #6ee7b7; stroke-width: 3; }
      .pill-t { font-family: Inter, "Segoe UI", Arial, sans-serif; font-weight: 800; font-size: 28px; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2880" height="3840"/>

  <!-- Header -->
  <g transform="translate(58, 52)">
    <text class="h1 ink" x="0" y="100">Wildfire Risk Mapping in California</text>
    <text class="sub" x="0" y="168">Neighborhood-scale risk (Census block groups) + six-map D3 dashboard</text>
    <text class="team" x="0" y="228">Phoenix Gray, Andrei Arion, Thomas Link, Celine Phan, Daisy Than, Pradeep Singh</text>
    <text class="meta" x="0" y="278">Live visualization:</text>
    <text class="mono" x="210" y="278">https://psingh449.github.io/wildfire-risk-mapping/</text>
    <line x1="0" y1="308" x2="2764" y2="308" stroke="#e2e8f0" stroke-width="4"/>
  </g>

  <!-- Main: left narrative + right screenshot slots -->
  <g transform="translate(58, 388)">
    <g id="left">
      <!-- 1 Motivation -->
      <g>
        <rect class="border" x="0" y="0" width="1480" height="420" rx="26"/>
        <text class="h2 ink" x="36" y="72">Motivation</text>
        <text class="body" x="44" y="128">
          <tspan x="44" dy="0">&#8226; Many products show one wildfire score per county, smoothing away neighborhood differences.</tspan>
          <tspan x="44" dy="46">&#8226; Within a county, fuel, exposure, vulnerability, and resilience can vary widely across block groups.</tspan>
          <tspan x="44" dy="46">&#8226; County averages hide hotspots; block-group maps make concentrated risk visible.</tspan>
          <tspan x="44" dy="46">&#8226; Use cases: evacuation planning, mitigation targeting, preparedness, transparent public communication.</tspan>
        </text>
      </g>

      <!-- 2 Approach -->
      <g transform="translate(0, 460)">
        <rect class="border" x="0" y="0" width="1480" height="700" rx="26"/>
        <text class="h2 ink" x="36" y="72">Our approach</text>
        <text class="body" x="44" y="124">
          <tspan x="44" dy="0">&#8226; Reproducible pipeline: module scores and risk at Census block-group scale across 58 CA counties (25,607 block groups).</tspan>
          <tspan x="44" dy="46">&#8226; Static D3.js site: six synchronized maps (EAL, Risk, Hazard, Exposure, Vulnerability, Resilience) plus a validation dashboard.</tspan>
          <tspan x="44" dy="46">&#8226; FEMA-style structure with PCA-derived within-module weights; provenance/quality tier per field (REAL / ESTIMATED / PROXY / MISSING).</tspan>
        </text>
        <g transform="translate(36, 258)">
          <rect class="pill-h" x="0" y="0" width="228" height="58" rx="29"/>
          <text class="pill-t" x="114" y="40" text-anchor="middle">Hazard (H)</text>
          <rect class="pill-e" x="248" y="0" width="248" height="58" rx="29"/>
          <text class="pill-t" x="372" y="40" text-anchor="middle">Exposure (E)</text>
          <rect class="pill-v" x="516" y="0" width="300" height="58" rx="29"/>
          <text class="pill-t" x="666" y="40" text-anchor="middle">Vulnerability (V)</text>
          <rect class="pill-r" x="836" y="0" width="268" height="58" rx="29"/>
          <text class="pill-t" x="970" y="40" text-anchor="middle">Resilience (R)</text>
        </g>
        <g transform="translate(36, 340)">
          <rect class="eqbox" x="0" y="0" width="1408" height="156" rx="20"/>
          <text class="eqtxt" x="24" y="62">risk = H &#215; E &#215; V &#215; (1 &#8722; R)</text>
          <text class="eqtxt" x="24" y="118">EAL = risk &#215; BuildingValue</text>
        </g>
        <text class="body" x="44" y="548">
          <tspan x="44" dy="0">&#8226; Each module normalized to [0, 1]; (1 &#8722; R) keeps overall risk bounded in [0, 1].</tspan>
          <tspan x="44" dy="46">&#8226; Linked maps support attribution: see why an area is high risk, not only the composite score.</tspan>
        </text>
      </g>

      <!-- 3 Data -->
      <g transform="translate(0, 1200)">
        <rect class="border" x="0" y="0" width="1480" height="400" rx="26"/>
        <text class="h2 ink" x="36" y="72">Data</text>
        <text class="body" x="44" y="128">
          <tspan x="44" dy="0">&#8226; Geometries: TIGER/Line California block groups; population/housing: Census 2020 (API).</tspan>
          <tspan x="44" dy="46">&#8226; Socioeconomics: ACS 2021 5-year (API); county benchmark: FEMA NRI wildfire (download).</tspan>
          <tspan x="44" dy="46">&#8226; Fire history: CAL FIRE perimeters 2015&#8211;2024 and MTBS for validation labels.</tspan>
          <tspan x="44" dy="46">&#8226; Hazard proxies: USFS WHP when available; NLCD-style vegetation and forest proximity; OSM-derived access where needed.</tspan>
        </text>
      </g>

      <!-- 4 Interactive visualization -->
      <g transform="translate(0, 1640)">
        <rect class="border" x="0" y="0" width="1480" height="360" rx="26"/>
        <text class="h2 ink" x="36" y="72">Interactive visualization</text>
        <text class="body" x="44" y="128">
          <tspan x="44" dy="0">&#8226; Pick a county; block-group layer loads from static GeoJSON on GitHub Pages.</tspan>
          <tspan x="44" dy="46">&#8226; Pan and zoom once; all six maps stay aligned to the same view.</tspan>
          <tspan x="44" dy="46">&#8226; Hover highlights the same polygon everywhere; tooltip shows module scores, EAL, and provenance tags.</tspan>
        </text>
      </g>

      <!-- 5 Experiments + results -->
      <g transform="translate(0, 2040)">
        <rect class="border" x="0" y="0" width="1480" height="500" rx="26"/>
        <text class="h2 ink" x="36" y="72">Experiments and results</text>
        <text class="body" x="44" y="124">
          <tspan x="44" dy="0">&#8226; Module influence: Pearson correlation of H, E, V, R with final risk (sanity-check drivers; resilience negative).</tspan>
          <tspan x="44" dy="44">&#8226; Historical fires: overlap with CAL FIRE 2015&#8211;2024; precision, recall, F1, accuracy, AUC vs burned block groups.</tspan>
          <tspan x="44" dy="44">&#8226; Scale (paper): 4,048 fires; 1,646 of 25,607 block groups burned (6.4%).</tspan>
          <tspan x="44" dy="44">&#8226; FEMA check: county-aggregated risk vs NRI wildfire index (sanity, not exact match).</tspan>
          <tspan x="44" dy="44">&#8226; Concentration: share of risk in top decile and Gini-style heterogeneity within counties.</tspan>
          <tspan x="44" dy="44">&#8226; Interface: legible six-map layout, legends, provenance visibility, fast static hosting.</tspan>
        </text>
      </g>

      <!-- 6 Comparison -->
      <g transform="translate(0, 2580)">
        <rect class="border" x="0" y="0" width="1480" height="300" rx="26"/>
        <text class="h2 ink" x="36" y="72">Comparison to alternatives</text>
        <text class="body" x="44" y="128">
          <tspan x="44" dy="0">&#8226; vs county-only maps: we preserve within-county neighborhood variation and hotspot structure.</tspan>
          <tspan x="44" dy="46">&#8226; vs hazard-only layers: we tie physical risk to people, assets, vulnerability, and response capacity.</tspan>
          <tspan x="44" dy="46">&#8226; vs a single vulnerability index: we require hazard and exposure to align for high compound risk.</tspan>
        </text>
      </g>

      <!-- 7 Key takeaways -->
      <g transform="translate(0, 2920)">
        <rect class="border" x="0" y="0" width="1480" height="260" rx="26"/>
        <text class="h2 ink" x="36" y="72">Key takeaways</text>
        <text class="body" x="44" y="128">
          <tspan x="44" dy="0">&#8226; County averages are not enough: wildfire-relevant risk is highly heterogeneous at finer scale.</tspan>
          <tspan x="44" dy="46">&#8226; A transparent block-group pipeline surfaces actionable hotspots with auditable inputs.</tspan>
          <tspan x="44" dy="46">&#8226; Linked multi-map UI explains where risk is high and which modules drive that pattern.</tspan>
        </text>
      </g>

      <!-- 8 Implementation -->
      <g transform="translate(0, 3220)">
        <rect class="border" x="0" y="0" width="1480" height="178" rx="26"/>
        <text class="h2 ink" x="36" y="64">Implementation</text>
        <text class="body" x="44" y="108">
          <tspan x="44" dy="0">&#8226; Spec and weights: calculations.csv; pipeline: Python and GeoPandas; per-county outputs under data/processed/counties/FIPS/.</tspan>
          <tspan x="44" dy="42">&#8226; UI: static D3 build deployed on GitHub Pages.</tspan>
        </text>
      </g>
    </g>

    <!-- Right: screenshot / figure placeholders (no external images) -->
    <g id="right" transform="translate(1620, 0)">
      <g>
        <rect class="dash" x="0" y="0" width="1144" height="1080" rx="26"/>
        <text class="h2 muted" x="572" y="520" text-anchor="middle">Screenshot area 1</text>
        <text class="meta" x="572" y="578" text-anchor="middle">Six synchronized maps (replace with your image)</text>
      </g>
      <g transform="translate(0, 1110)">
        <rect class="dash" x="0" y="0" width="1144" height="720" rx="26"/>
        <text class="h2 muted" x="572" y="360" text-anchor="middle">Screenshot area 2</text>
        <text class="meta" x="572" y="418" text-anchor="middle">Pipeline / data-flow figure</text>
      </g>
      <g transform="translate(0, 1860)">
        <rect class="dash" x="0" y="0" width="1144" height="720" rx="26"/>
        <text class="h2 muted" x="572" y="360" text-anchor="middle">Screenshot area 3</text>
        <text class="meta" x="572" y="418" text-anchor="middle">Tooltip / linked highlight</text>
      </g>
      <g transform="translate(0, 2610)">
        <rect class="dash" x="0" y="0" width="1144" height="720" rx="26"/>
        <text class="h2 muted" x="572" y="360" text-anchor="middle">Screenshot area 4</text>
        <text class="meta" x="572" y="418" text-anchor="middle">Results: KPI table, AUC, or FEMA scatter (your pick)</text>
      </g>
    </g>
  </g>
</svg>
